name: Update Voting Data

on:
  push:
  schedule:
    - cron: |
        0 6 * * *
        0 7-23 * * 3
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    if: "!(github.event.repository.fork && github.event_name == 'schedule')"
    runs-on: ubuntu-latest
    env:
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        if: env.BASE_RPC_URL != '' && github.event.head_commit.author.name != 'github-actions[bot]'
        with:
          node-version: "22"
      - if: env.BASE_RPC_URL != '' && github.event.head_commit.author.name != 'github-actions[bot]'
        run: |
          npm install
          npm run fetch
          npm run analyse
          npm run build
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html prices.csv votes.csv
          git diff --staged --quiet || (git commit -m "chore: update voting data" && git push)
          tar -cvf "$RUNNER_TEMP/artifact.tar" index.html votes.csv
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        id: deployment
