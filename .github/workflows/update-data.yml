name: Update Voting Data

on:
  push:
  schedule:
    - cron: "0 6 * * 5" # Every Friday at 06:00 UTC (after epoch flip)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        if: env.BASE_RPC_URL != '' && github.actor != 'github-actions[bot]'
        with:
          node-version: "22"
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}

      - name: Install dependencies
        if: env.BASE_RPC_URL != '' && github.actor != 'github-actions[bot]'
        run: npm install
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}

      - name: Fetch voting data
        if: env.BASE_RPC_URL != '' && github.actor != 'github-actions[bot]'
        run: npm run fetch
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}

      - name: Commit updated data
        if: env.BASE_RPC_URL != '' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html prices.csv votes.csv
          git diff --staged --quiet || (git commit -m "chore: update voting data" && git push)
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}

      - run: rm -rf node_modules

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: .

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        id: deployment
